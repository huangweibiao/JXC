# 生产环境配置
server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://prod-db-host:3306/jxc_prod?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    druid:
      max-active: 50

  security:
    oauth2:
      client:
        registration:
          jxc-client:
            client-id: ${OAUTH2_CLIENT_ID}
            client-secret: ${OAUTH2_CLIENT_SECRET}
            redirect-uri: https://your-domain.com/login/oauth2/code/jxc-client
        provider:
          oauth2-server:
            issuer-uri: ${OAUTH2_ISSUER_URI}

logging:
  level:
    root: WARN
    com.jxc: INFO
  file:
    name: /var/log/jxc/application.log
