<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout/main :: layout(~{::headFragment}, ~{::content}, 'dashboard')}">
<headFragment>
    <style>
        .dashboard {
            padding: 20px;
        }

        .dashboard-header {
            margin-bottom: 30px;
        }

        .dashboard-header h2 {
            font-size: 24px;
            color: #333;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .stat-card h3 {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: bold;
            color: #333;
        }

        .stat-card .trend {
            margin-top: 10px;
            font-size: 14px;
        }

        .stat-card .trend.up {
            color: #10b981;
        }

        .stat-card .trend.down {
            color: #ef4444;
        }

        .quick-actions {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .quick-actions h3 {
            margin-bottom: 20px;
            font-size: 18px;
            color: #333;
        }

        .action-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .action-button {
            display: block;
            padding: 15px;
            background: #f8f9fa;
            border: 1px solid #ddd;
            border-radius: 6px;
            text-align: center;
            text-decoration: none;
            color: #333;
            transition: all 0.3s;
        }

        .action-button:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .action-button i {
            font-size: 24px;
            margin-bottom: 8px;
            display: block;
        }

        .recent-activities {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            margin-top: 20px;
        }

        .recent-activities h3 {
            margin-bottom: 20px;
            font-size: 18px;
            color: #333;
        }

        .activity-list {
            list-style: none;
        }

        .activity-list li {
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }

        .activity-list li:last-child {
            border-bottom: none;
        }

        .activity-list .time {
            color: #999;
            font-size: 13px;
        }
    </style>
</headFragment>

<content>
    <div class="dashboard" sec:authorize="isAuthenticated()">
        <div class="dashboard-header">
            <h2>工作台</h2>
            <p>欢迎回来，<span sec:authentication="name">用户</span>！</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>今日采购额</h3>
                <div class="value">¥12,580</div>
                <div class="trend up">↑ 15.3%</div>
            </div>
            <div class="stat-card">
                <h3>今日销售额</h3>
                <div class="value">¥28,690</div>
                <div class="trend up">↑ 22.7%</div>
            </div>
            <div class="stat-card">
                <h3>库存预警</h3>
                <div class="value">23</div>
                <div class="trend down">↓ 5 件</div>
            </div>
            <div class="stat-card">
                <h3>待处理订单</h3>
                <div class="value">8</div>
                <div class="trend">待处理</div>
            </div>
        </div>

        <div class="quick-actions">
            <h3>快捷操作</h3>
            <div class="action-buttons">
                <a href="/purchase/orders/create" class="action-button">
                    <i>📦</i>
                    创建采购订单
                </a>
                <a href="/sales/orders/create" class="action-button">
                    <i>📝</i>
                    创建销售订单
                </a>
                <a href="/inventory/list" class="action-button">
                    <i>📊</i>
                    库存查询
                </a>
                <a href="/products/create" class="action-button">
                    <i>➕</i>
                    新增商品
                </a>
            </div>
        </div>

        <div class="recent-activities">
            <h3>最近动态</h3>
            <ul class="activity-list">
                <li>
                    <div>采购订单 PO20240315001 已审核通过</div>
                    <div class="time">10分钟前</div>
                </li>
                <li>
                    <div>客户 张三 完成付款 ¥15,000</div>
                    <div class="time">30分钟前</div>
                </li>
                <li>
                    <div>库存预警：商品 iPhone 15 库存低于安全库存</div>
                    <div class="time">1小时前</div>
                </li>
            </ul>
        </div>
    </div>

    <div sec:authorize="!isAuthenticated()">
        <p style="text-align: center; padding: 50px;">
            请先<a href="/login">登录</a>系统
        </p>
    </div>
</content>
</html>
